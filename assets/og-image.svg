<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AI Daily — your morning AI briefing in a single prompt">
  <!-- Page background — matches landing bg-page #FAFAFA -->
  <rect width="1200" height="630" fill="#FAFAFA"/>

  <!-- Subtle top accent rule -->
  <rect x="0" y="0" width="1200" height="4" fill="#111827"/>

  <!-- Left column — wordmark + tagline -->
  <g font-family="Familjen Grotesk, ui-sans-serif, system-ui, sans-serif">
    <!-- Eyebrow -->
    <text x="76" y="118"
          font-size="20" font-weight="700" letter-spacing="4.5"
          fill="#9CA3AF">YOUR MORNING AI BRIEFING</text>

    <!-- Wordmark (mirrors hero-title: weight 700, very tight tracking) -->
    <text x="76" y="270"
          font-size="156" font-weight="700" letter-spacing="-7"
          fill="#111827">AI Daily</text>

    <!-- Tagline (mirrors hero-tagline color #4B5563) -->
    <text x="76" y="338"
          font-size="32" font-weight="500" letter-spacing="-0.6"
          fill="#4B5563">A personal news briefing — generated</text>
    <text x="76" y="378"
          font-size="32" font-weight="500" letter-spacing="-0.6"
          fill="#4B5563">by your AI assistant in a single prompt.</text>

    <!-- CTA pill (mirrors .hero-cta) -->
    <g transform="translate(76, 422)">
      <rect x="0" y="0" width="232" height="48" rx="24" fill="#111827"/>
      <text x="116" y="31" text-anchor="middle"
            font-size="16" font-weight="600" letter-spacing="-0.2"
            fill="#FFFFFF">Build one in 5 minutes</text>
    </g>
    <g transform="translate(324, 422)">
      <rect x="0" y="0" width="96" height="48" rx="24" fill="#FAFAFA" stroke="#E5E7EB"/>
      <text x="48" y="31" text-anchor="middle"
            font-size="16" font-weight="600" letter-spacing="-0.2"
            fill="#4B5563">GitHub</text>
    </g>
  </g>

  <!-- Section accent bar (mirrors landing section divider colors) -->
  <g>
    <rect x="76"  y="538" width="120" height="6" rx="3" fill="#2563EB"/>
    <rect x="206" y="538" width="120" height="6" rx="3" fill="#DB2777"/>
    <rect x="336" y="538" width="120" height="6" rx="3" fill="#16A34A"/>
    <rect x="466" y="538" width="120" height="6" rx="3" fill="#DC2626"/>
    <rect x="596" y="538" width="120" height="6" rx="3" fill="#7C3AED"/>
    <rect x="726" y="538" width="120" height="6" rx="3" fill="#EA580C"/>
    <rect x="856" y="538" width="120" height="6" rx="3" fill="#0F766E"/>
  </g>

  <!-- Footer URL -->
  <text x="76" y="588"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="20" font-weight="500" letter-spacing="0.4"
        fill="#6B7280">raff-dev.github.io/ai-daily</text>

  <!-- Right column — prompt card (mirrors landing .prompt-card / .prompt-code) -->
  <g transform="translate(740, 100)">
    <!-- Outer white card shell -->
    <rect x="0" y="0" width="400" height="430" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <!-- Inner dark code panel -->
    <rect x="10" y="10" width="380" height="410" rx="12" fill="#0B1020"/>

    <!-- Copy button (mirrors .copy-btn) -->
    <g transform="translate(346, 30)">
      <rect x="0" y="0" width="34" height="34" rx="8"
            fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
      <rect x="11" y="9" width="11" height="13" rx="2" fill="none" stroke="#CBD5E1" stroke-width="1.6"/>
      <rect x="14" y="13" width="11" height="13" rx="2" fill="#0B1020" stroke="#CBD5E1" stroke-width="1.6"/>
    </g>

    <!-- Prompt text (JetBrains Mono, matches .prompt-code) -->
    <g font-family="JetBrains Mono, ui-monospace, monospace"
       font-size="16" font-weight="500" fill="#E2E8F0">
      <text x="34" y="74">Read </text>
      <text x="88" y="74" fill="#93C5FD">https://github.com/</text>
      <text x="34" y="98" fill="#93C5FD">Raff-dev/ai-daily</text>
      <text x="34" y="138">and generate me a news</text>
      <text x="34" y="162">briefing about </text>
      <text x="200" y="162" fill="#FCD34D">[your topics]</text>
      <text x="324" y="162">.</text>
      <text x="34" y="202">Save it as an HTML file I</text>
      <text x="34" y="226">can open.</text>
    </g>

    <!-- Cursor blink line -->
    <rect x="158" y="214" width="2" height="18" fill="#E2E8F0" opacity="0.7"/>
  </g>
</svg>

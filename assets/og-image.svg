<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="AI Daily — your morning AI briefing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle accent stripe -->
  <rect x="0" y="0" width="1200" height="6" fill="#111827"/>

  <!-- Eyebrow -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" fill="#6B7280">
    <text x="80" y="138" font-size="22" font-weight="700" letter-spacing="6">YOUR MORNING AI BRIEFING</text>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" fill="#111827">
    <text x="80" y="290" font-size="148" font-weight="800" letter-spacing="-7">AI Daily</text>
  </g>

  <!-- Tagline -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" fill="#374151">
    <text x="80" y="370" font-size="40" font-weight="500" letter-spacing="-1">A personal news briefing — generated by your</text>
    <text x="80" y="420" font-size="40" font-weight="500" letter-spacing="-1">AI assistant in a single prompt.</text>
  </g>

  <!-- Section color row -->
  <g>
    <rect x="80"  y="500" width="120" height="6" fill="#2563EB"/>
    <rect x="220" y="500" width="120" height="6" fill="#DB2777"/>
    <rect x="360" y="500" width="120" height="6" fill="#16A34A"/>
    <rect x="500" y="500" width="120" height="6" fill="#DC2626"/>
    <rect x="640" y="500" width="120" height="6" fill="#7C3AED"/>
    <rect x="780" y="500" width="120" height="6" fill="#EA580C"/>
    <rect x="920" y="500" width="120" height="6" fill="#0F766E"/>
  </g>

  <!-- Footer -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" fill="#6B7280">
    <text x="80" y="568" font-size="22" font-weight="600" letter-spacing="0.5">github.com/Raff-dev/ai-daily</text>
  </g>

  <!-- Right-side badge -->
  <g transform="translate(960, 220)">
    <rect x="0" y="0" width="160" height="160" rx="36" fill="#111827"/>
    <text x="80" y="100" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-size="64" font-weight="800" fill="#FAFAFA" letter-spacing="-2">AI</text>
    <rect x="34" y="112" width="92" height="8" rx="4" fill="#FAFAFA" opacity="0.85"/>
    <rect x="34" y="128" width="60" height="6" rx="3" fill="#FAFAFA" opacity="0.55"/>
  </g>
</svg>

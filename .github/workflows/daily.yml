name: Daily AI Brief

on:
  schedule:
    # 05:00 UTC = 06:00 Warsaw (CET) / 07:00 Warsaw (CEST)
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-brief
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: override the Claude model
          # CLAUDE_MODEL: claude-opus-4-5
        run: python run.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ index.html
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore: AI Daily Brief $(date -u +%Y-%m-%d)"
          git push

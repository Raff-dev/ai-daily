name: Daily AI Brief

on:
  schedule:
    # 05:00 UTC = 06:00 Warsaw (CET) / 07:00 Warsaw (CEST)
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-brief
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        env:
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          AGENT_PROMPT_PATH: ${{ vars.AGENT_PROMPT_PATH || 'agent.md' }}
          AGENT_COMMAND: ${{ vars.AGENT_COMMAND }}
          AGENT_TIMEOUT_SECONDS: ${{ vars.AGENT_TIMEOUT_SECONDS || '1800' }}
        run: python run.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ index.html
          git diff --staged --quiet && echo "nothing to commit" && exit 0
          git commit -m "chore: AI Daily Brief $(date -u +%Y-%m-%d)"
          git push

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R outputs _site/outputs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
